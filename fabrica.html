<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estoque · Fábrica</title>

<link rel="stylesheet" href="./css/brodao.css">
<!-- ===================== PWA ===================== -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#811f3b">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Estoque">
<link rel="apple-touch-icon" href="img/icon-192.png">
<!-- ================================================ -->

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">

</head>
<body>

<header>
  <div class="logo-area">
    <img src="img/logoBrodao.png" class="logo-brodao">
    <div class="logo-text">
      <h1>Estoque <span class="fabrica-badge">🏭 Fábrica</span></h1>
      <p>Controle de salgados · Fábrica</p>
    </div>
  </div>
  <div class="summary-bar">
    <div class="summary-chip">
      <span class="label">Caixas totais</span>
      <span class="value" id="total-boxes">0</span>
    </div>
    <div class="summary-chip">
      <span class="label">Salgados totais</span>
      <span class="value total-unit" id="total-units">0</span>
    </div>
    <div class="summary-chip">
      <span class="label">Itens em falta</span>
      <span class="value" id="total-empty" style="color: var(--red)">0</span>
    </div>
  </div>
</header>

<main>
  <div class="section-title">Salgados · Fábrica</div>
  <div class="grid" id="grid"></div>
</main>

<footer>20 salgados por caixa · atualizado em tempo real</footer>

<div id="toast"></div>

<!-- Modal de quantidade customizada -->
<div class="modal-overlay" id="qty-modal">
  <div class="modal">
    <div>
      <div class="modal-title" id="modal-title">Quantidade</div>
      <div class="modal-subtitle" id="modal-subtitle">caixas</div>
    </div>
    <div class="modal-input-row">
      <input class="modal-input" type="number" id="modal-input" min="1" value="1">
      <div class="modal-stepper">
        <button class="modal-step-btn" id="modal-step-up">▲</button>
        <button class="modal-step-btn" id="modal-step-dn">▼</button>
      </div>
    </div>
    <div class="modal-actions">
      <button class="modal-btn cancel" id="modal-cancel">Cancelar</button>
      <div class="modal-btn-row" style="flex:2;display:flex;gap:0.6rem;">
        <button class="modal-btn remove" id="modal-remove">− Remover</button>
        <button class="modal-btn add"    id="modal-add">+ Adicionar</button>
      </div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyD5WD6H5KDr3cglKW71JRqdgtnKyypwKtc",
  authDomain: "estoque-brodao.firebaseapp.com",
  databaseURL: "https://estoque-brodao-default-rtdb.firebaseio.com",
  projectId: "estoque-brodao",
};

// Fábrica usa seu próprio nó no Firebase: estoque/fabrica
const LOJA = 'fabrica';

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);
const estoqueRef = ref(db, `estoque/${LOJA}`);

const PER_BOX = 20;

const defaults = [
  { id: 1,  emoji: '🧅', name: 'Cebola',           sub: 'Queijo, Presunto e cebola',  boxes: 0 },
  { id: 2,  emoji: '🧀', name: 'Queijo e Presunto', sub: 'Tradicional',                boxes: 0 },
  { id: 3,  emoji: '🍔', name: 'Hamburguer',        sub: 'Mussarela',                  boxes: 0 },
  { id: 4,  emoji: '🍯', name: 'Hamburguer',        sub: 'Cheddar',                    boxes: 0 },
  { id: 5,  emoji: '🍗', name: 'Frango',            sub: 'Frango com Requeijão',       boxes: 0 },
  { id: 6,  emoji: '🍖', name: 'Carne-Seca',        sub: '',                           boxes: 0 },
  { id: 7,  emoji: '🌿', name: 'Pastel de Forno',   sub: 'Queijo minas e espinafre',   boxes: 0 },
  { id: 8,  emoji: '🍗', name: 'Pastel de Forno',   sub: 'Frango',                     boxes: 0 },
  { id: 9,  emoji: '🥟', name: 'Coxinha',           sub: 'Frango com catupiry',        boxes: 0 },
  { id: 10, emoji: '',   name: 'Coxinha',           sub: 'SEM',                        boxes: 0 },
  { id: 11, emoji: '🍕', name: 'Calabresa',         sub: '',                           boxes: 0 },
  { id: 12, emoji: '🍡', name: 'Napolitano',        sub: '',                           boxes: 0 },
  { id: 13, emoji: '🌭', name: 'Dogão',             sub: '',                           boxes: 0 },
  { id: 14, emoji: '🥩', name: 'Costela',           sub: '',                           boxes: 0 },
  { id: 15, emoji: '🍇', name: 'Açaí',              sub: '',                           boxes: 0 },
  { id: 16, emoji: '🍨', name: 'Sorvete',           sub: '',                           boxes: 0 },
  { id: 17, emoji: '',   name: 'Kibe',              sub: '',                           boxes: 0 },
  { id: 18, emoji: '🥐', name: 'Croissant',         sub: 'Chocolate',                  boxes: 0 },
  { id: 19, emoji: '🌕', name: 'Pão de queijo',     sub: '',                           boxes: 0 },
];

const items = defaults.map(i => ({ ...i }));

function saveItem(id, boxes) {
  update(estoqueRef, { [id]: boxes });
}

onValue(estoqueRef, (snapshot) => {
  const data = snapshot.val() || {};
  items.forEach(item => {
    if (data[item.id] !== undefined) item.boxes = data[item.id];
  });
  render();
  setLoading(false);
});

function setLoading(on) {
  document.getElementById('grid').style.opacity = on ? '0.4' : '1';
}
setLoading(true);

function getBadge(boxes) {
  if (boxes === 0) return ['badge-empty', 'Esgotado'];
  if (boxes <= 2)  return ['badge-low',   'Baixo'];
  return ['badge-ok', 'OK'];
}

function render() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  items.forEach(item => {
    const [badgeClass, badgeLabel] = getBadge(item.boxes);
    const units = item.boxes * PER_BOX;
    const div = document.createElement('div');
    div.className = 'card';
    div.id = `card-${item.id}`;
    div.innerHTML = `
      <div class="card-top">
        <div>
          <div style="display:flex;align-items:center;gap:0.6rem">
            <span class="card-emoji">${item.emoji}</span>
            <div>
              <div class="card-name">${item.name}</div>
              <div class="card-sub">${item.sub}</div>
            </div>
          </div>
        </div>
        <span class="badge ${badgeClass}">${badgeLabel}</span>
      </div>
      <div class="card-counts">
        <div class="count-block">
          <div class="cb-label">Caixas</div>
          <div class="cb-value highlight" id="boxes-${item.id}">${item.boxes}</div>
        </div>
        <div class="count-block">
          <div class="cb-label">Salgados</div>
          <div class="cb-value" id="units-${item.id}">${units}</div>
        </div>
      </div>
      <div class="card-controls">
        <button class="ctrl-btn minus" onclick="change(${item.id}, -1)" ${item.boxes === 0 ? 'disabled' : ''} title="Remover caixa">−</button>
        <span class="ctrl-label">caixas</span>
        <button class="ctrl-btn plus" onclick="change(${item.id}, +1)" title="Adicionar caixa">+</button>
        <button class="ctrl-btn custom" onclick="openQtyModal(${item.id})" title="Quantidade personalizada">⊞</button>
      </div>
    `;
    grid.appendChild(div);
  });
  updateSummary();
}

window.change = function(id, delta) {
  const item = items.find(i => i.id === id);
  if (!item) return;
  const newVal = item.boxes + delta;
  if (newVal < 0) return;
  item.boxes = newVal;

  const [badgeClass, badgeLabel] = getBadge(item.boxes);
  const card     = document.getElementById(`card-${item.id}`);
  const boxEl    = document.getElementById(`boxes-${item.id}`);
  const unitEl   = document.getElementById(`units-${item.id}`);
  const badge    = card.querySelector('.badge');
  const minusBtn = card.querySelector('.ctrl-btn.minus');

  boxEl.textContent  = item.boxes;
  unitEl.textContent = item.boxes * PER_BOX;
  badge.className    = `badge ${badgeClass}`;
  badge.textContent  = badgeLabel;
  minusBtn.disabled  = item.boxes === 0;

  boxEl.classList.remove('pop');
  void boxEl.offsetWidth;
  boxEl.classList.add('pop');
  showToast(delta > 0 ? '📦' : '🗑️', item.name, delta);
  saveItem(item.id, item.boxes);
  updateSummary();
};

function updateSummary() {
  const totalBoxes = items.reduce((s, i) => s + i.boxes, 0);
  const totalUnits = totalBoxes * PER_BOX;
  const empty      = items.filter(i => i.boxes === 0).length;
  document.getElementById('total-boxes').textContent = totalBoxes;
  document.getElementById('total-units').textContent = totalUnits;
  document.getElementById('total-empty').textContent = empty;
}

let toastTimer;
function showToast(icon, name, delta) {
  const el = document.getElementById('toast');
  const abs = Math.abs(delta);
  const caixas = abs === 1 ? '1 caixa' : `${abs} caixas`;
  const action = delta > 0 ? 'adicionadas ao' : 'removidas do';
  el.innerHTML = `<span class="toast-icon">${icon}</span> ${caixas} ${action} estoque de <strong>${name}</strong>`;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}

// Modal de quantidade personalizada
let modalItemId = null;
const modal      = document.getElementById('qty-modal');
const modalInput = document.getElementById('modal-input');

window.openQtyModal = function(id) {
  const item = items.find(i => i.id === id);
  if (!item) return;
  modalItemId = id;
  document.getElementById('modal-title').textContent = item.name + (item.sub ? ` · ${item.sub}` : '');
  document.getElementById('modal-subtitle').textContent = `Estoque atual: ${item.boxes} caixas`;
  modalInput.value = 1;
  modal.classList.add('open');
  setTimeout(() => modalInput.focus(), 100);
};

document.getElementById('modal-cancel').addEventListener('click', () => modal.classList.remove('open'));
modal.addEventListener('click', e => { if (e.target === modal) modal.classList.remove('open'); });

document.getElementById('modal-step-up').addEventListener('click', () => {
  modalInput.value = Math.max(1, (parseInt(modalInput.value) || 0) + 1);
});
document.getElementById('modal-step-dn').addEventListener('click', () => {
  modalInput.value = Math.max(1, (parseInt(modalInput.value) || 2) - 1);
});

document.getElementById('modal-add').addEventListener('click', () => {
  const qty = parseInt(modalInput.value) || 0;
  if (qty < 1) return;
  change(modalItemId, qty);
  modal.classList.remove('open');
});

document.getElementById('modal-remove').addEventListener('click', () => {
  const qty = parseInt(modalInput.value) || 0;
  if (qty < 1) return;
  change(modalItemId, -qty);
  modal.classList.remove('open');
});

modalInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('modal-add').click();
  if (e.key === 'Escape') modal.classList.remove('open');
});
</script>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/service-worker.js')
        .catch(err => console.warn('SW não registrado:', err));
    });
  }
</script>

</body>
</html>
